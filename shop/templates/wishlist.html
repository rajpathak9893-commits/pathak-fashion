{% extends 'master.html' %}

{% block content %}

<style>

/* TITLE */
.title{
text-align:center;
font-size:32px;
margin:30px 0;
color:#0b1c3d;
}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:20px 40px;
}

/* CARD */
.card{
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

/* IMAGE */
.card img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
}

/* PRICE */
.price{
color:#e63946;
font-weight:bold;
margin:10px 0;
}

/* BUTTON */
.btn{
padding:8px 15px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
margin:5px;
}

/* REMOVE */
.remove-btn{
background:red;
color:white;
}

/* CART */
.cart-btn{
background:#ffd700;
}

</style>

<h2 class="title">❤️ My Wishlist</h2>

<div class="products">

{% for item in items %}

<div class="card">

<img src="{{ item.product.image.url }}">

<h4>{{ item.product.Product_name }}</h4>

<div class="price">₹{{ item.product.price }}</div>

<!-- REMOVE -->
<a href="{% url 'remove_wishlist' item.id %}">
<button class="btn remove-btn">❌ Remove</button>
</a>

<!-- MOVE TO CART -->
<a href="{% url 'add_to_cart' item.product.id %}">
<button class="btn cart-btn">🛒 Add to Cart</button>
</a>

</div>

{% empty %}

<h3 style="text-align:center;">Your wishlist is empty 💔</h3>

{% endfor %}

</div>

{% endblock %}
