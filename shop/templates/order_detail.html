{% extends 'master.html' %}

{% block content %}

<style>

.container{
max-width:800px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.card h2{
margin-bottom:20px;
color:#0b1c3d;
}

.info{
margin:10px 0;
font-size:16px;
}

/* STATUS COLORS */
.status{
padding:6px 12px;
border-radius:20px;
color:white;
font-size:14px;
}

.pending{ background:orange; }
.shipped{ background:blue; }
.delivered{ background:green; }

</style>

<div class="container">

<div class="card">

<h2>Order Details</h2>

<div class="info"><strong>Product:</strong> {{ order.product.Product_name }}</div>

<div class="info"><strong>Price:</strong> ₹{{ order.total_price }}</div>

<div class="info"><strong>Quantity:</strong> {{ order.quantity }}</div>

<div class="info">
<strong>Status:</strong> 
<span class="status {{ order.status }}">
    {{ order.status }}
</span>
</div>

<div class="info"><strong>Date:</strong> {{ order.created_at }}</div>

</div>

</div>

{% endblock %}
