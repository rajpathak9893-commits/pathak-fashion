{% extends 'master.html' %}

{% block content %}

<style>

.login-container{
display:flex;
justify-content:center;
align-items:center;
min-height:80vh;
}

.login-box{
background:white;
width:400px;
padding:35px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
animation:fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.login-box h2{
margin-bottom:20px;
color:#0b1c3d;
}

.login-box input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
outline:none;
transition:0.3s;
}

.login-box input:focus{
border-color:#d4af37;
box-shadow:0 0 5px rgba(212,175,55,0.4);
}

/* Password wrapper */
.password-box{
position:relative;
}

.password-box span{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#555;
}

/* Button */
.login-btn{
width:100%;
padding:12px;
background:#d4af37;
border:none;
border-radius:25px;
color:#0b1c3d;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
background:#0b1c3d;
color:white;
}

/* Error */
.error{
color:red;
font-size:13px;
margin-bottom:10px;
}

/* Signup link */
.signup-link{
margin-top:15px;
font-size:14px;
}

.signup-link a{
color:#0b1c3d;
font-weight:bold;
text-decoration:none;
}

.signup-link a:hover{
text-decoration:underline;
}

</style>

<div class="login-container">

<div class="login-box">

<h2>Login</h2>

<form method="POST">
{% csrf_token %}

{% if messages %}
    {% for message in messages %}
        <div class="error">{{ message }}</div>
    {% endfor %}
{% endif %}

<input type="text" name="username" placeholder="Username" required>

<div class="password-box">
<input type="password" id="password" name="password" placeholder="Password" required>
<span onclick="togglePassword()">Show</span>
</div>

<button type="submit" class="login-btn">Login</button>

</form>

<div class="signup-link">
Don't have an account? 
<a href="{% url 'signup' %}">Register</a>
</div>

</div>

</div>

<!-- JavaScript -->
<script>
function togglePassword(){
    let pass = document.getElementById("password");
    
    if(pass.type === "password"){
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}
</script>

{% endblock %}
